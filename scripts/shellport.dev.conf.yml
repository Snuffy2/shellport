# Local development runtime config. `npm run dev` copies this template to
# .tmp/dev/shellport.conf.yml and uses the copied file as SHELLPORT_CONFIG.
HostName: ""
UserPassword: ""
AdminPassword: ""
DialTimeout: 5
Socks5: ""
Socks5User: ""
Socks5Password: ""
Hooks:
  before_connecting: []
HookTimeout: 30
Servers:
  - ListenInterface: 127.0.0.1
    ListenPort: 8182
    InitialTimeout: 10
    ReadTimeout: 120
    WriteTimeout: 120
    HeartbeatTimeout: 15
    ReadDelay: 10
    WriteDelay: 10
    TLSCertificateFile: ""
    TLSCertificateKeyFile: ""
    ServerTitle: ShellPort Dev
    ServerMessage: Local development server
Presets: []
OnlyAllowPresetRemotes: false
